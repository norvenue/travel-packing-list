<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行物品整理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Travel Packing Prototype</p>
        <h1 id="hero-title">旅行物品整理</h1>
        <p class="intro" id="hero-intro">先告诉我怎么称呼你，再一起整理这次旅程。</p>
      </header>

      <main class="prototype-card">
        <div class="step-pills" aria-label="当前步骤">
          <span class="step-pill is-active" data-step-pill="1">1. 称呼一下</span>
          <span class="step-pill" data-step-pill="2">2. 行程信息</span>
          <span class="step-pill" data-step-pill="3">3. 整理行李</span>
        </div>

        <section class="step-panel is-active" id="step-1" data-step="1" aria-labelledby="step-1-title">
          <div class="panel-heading is-centered">
            <p class="panel-kicker">第一步</p>
            <h2 id="step-1-title">怎么称呼小主～</h2>
            <p class="panel-desc">留下你的称呼吧！</p>
          </div>

          <form class="welcome-form" id="name-form">
            <label class="field is-centered">
              <span class="field-label">你的称呼</span>
              <input
                id="name-input"
                name="nickname"
                type="text"
                maxlength="20"
                placeholder=""
                required
              />
            </label>

            <button class="primary-btn" type="submit">确定</button>
          </form>
        </section>

        <section class="step-panel" id="step-2" data-step="2" aria-labelledby="step-2-title">
          <div class="panel-heading is-centered">
            <p class="panel-kicker">第二步</p>
            <h2 id="step-2-title">这一次又要去哪里看看？</h2>
            <p class="panel-desc">先填好目的地和出发日期，接着我们一起整理行李。</p>
          </div>

          <form class="trip-form" id="trip-form">
            <label class="field is-centered">
              <span class="field-label">旅游城市</span>
              <input
                id="city-input"
                name="city"
                type="text"
                maxlength="30"
                placeholder="例如：成都、东京、昆明"
                required
              />
            </label>

            <label class="field">
              <span class="field-label">出发日期</span>
              <input id="date-input" name="departureDate" type="date" required />
            </label>

            <div class="trip-form-actions">
              <button class="secondary-btn" id="edit-name-button" type="button">修改称呼</button>
              <button class="primary-btn" type="submit">下一步</button>
            </div>
          </form>
        </section>

        <section class="step-panel" id="step-3" data-step="3" aria-labelledby="step-3-title">
          <div class="panel-heading">
            <p class="panel-kicker">第三步</p>
            <h2 id="step-3-title">选择装行李的方式</h2>
            <p class="panel-desc" id="trip-summary">
              这次去 未填写，准备在 未选择日期 出发。
            </p>
          </div>

          <div class="layout-toggle" role="tablist" aria-label="装行李方式">
            <button class="toggle-btn is-active" type="button" data-bag-type="suitcase" aria-pressed="true">
              行李箱
            </button>
            <button class="toggle-btn" type="button" data-bag-type="backpack" aria-pressed="false">
              背包
            </button>
          </div>

          <div class="bag-stage">
            <div class="bag-figure" id="suitcase-figure" aria-label="平放行李箱图形">
              <svg viewBox="0 0 320 220" role="img" aria-hidden="true">
                <rect x="54" y="42" width="210" height="136" rx="28" fill="#f3e7d3" stroke="#6a4a2f" stroke-width="8"/>
                <rect x="30" y="82" width="28" height="56" rx="14" fill="#fffaf3" stroke="#6a4a2f" stroke-width="8"/>
                <line x1="88" y1="80" x2="228" y2="80" stroke="#6a4a2f" stroke-width="8" stroke-linecap="round"/>
                <line x1="116" y1="110" x2="200" y2="110" stroke="#6a4a2f" stroke-width="8" stroke-linecap="round"/>
                <line x1="88" y1="140" x2="228" y2="140" stroke="#6a4a2f" stroke-width="8" stroke-linecap="round"/>
                <circle cx="274" cy="78" r="12" fill="#d3b28d" stroke="#6a4a2f" stroke-width="8"/>
                <circle cx="274" cy="142" r="12" fill="#d3b28d" stroke="#6a4a2f" stroke-width="8"/>
              </svg>
            </div>

            <div class="bag-figure is-hidden" id="backpack-figure" aria-label="平放背包图形">
              <svg viewBox="0 0 320 220" role="img" aria-hidden="true">
                
                <rect x="88" y="52" width="144" height="126" rx="28" fill="#f0dfc2" stroke="#6a4a2f" stroke-width="8"/>
                <rect x="110" y="120" width="100" height="44" rx="12" fill="#fffaf3" stroke="#6a4a2f" stroke-width="8"/>
                <rect x="66" y="140" width="28" height="36" rx="12" fill="#fffaf3" stroke="#6a4a2f" stroke-width="8"/>
                <rect x="228" y="140" width="28" height="36" rx="12" fill="#fffaf3" stroke="#6a4a2f" stroke-width="8"/>

                <path d="M114 50 C126 120 194 120 206 50 Z" fill="#fffaf3" stroke="#6a4a2f" stroke-width="8" stroke-linejoin="round"/>
                <line x1="160" y1="50" x2="160" y2="112" stroke="#6a4a2f" stroke-width="8" stroke-linecap="round"/>
                <rect x="96" y="26" width="128" height="30" rx="12" fill="#fffaf3" stroke="#6a4a2f" stroke-width="8"/>
                <line x1="150" y1="92" x2="170" y2="92" stroke="#6a4a2f" stroke-width="8" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <section class="packing-bubble" aria-labelledby="bubble-title">
            <div class="bubble-head">
              <h3 id="bubble-title">要带的东西</h3>
              <button class="ghost-btn" id="back-button" type="button">返回修改行程</button>
            </div>

            <div class="category-list" id="category-list"></div>

            <button class="add-category-row" id="add-category-button" type="button">
              <span class="plus-box">+</span>
              <span>添加一个新的分类</span>
            </button>
          </section>

          <div class="step-footer-actions">
            <button class="danger-btn" id="reset-trip-button" type="button">开启新旅程</button>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-layer is-hidden" id="modal-layer" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <h3 id="modal-title">新增内容</h3>
          <button class="close-btn" id="close-modal-button" type="button" aria-label="关闭">
            ×
          </button>
        </div>

        <form id="modal-form" class="modal-form">
          <p class="modal-hint" id="modal-hint">请填写信息。</p>

          <label class="field" id="category-name-field">
            <span class="field-label">分类名称</span>
            <input id="category-name-input" type="text" maxlength="20" placeholder="例如：常备药品" />
          </label>

          <label class="field">
            <span class="field-label" id="item-input-label">物品内容</span>
            <input id="item-input" type="text" placeholder="例如：创可贴、防蚊液" />
          </label>

          <div class="modal-actions">
            <button class="secondary-btn" id="cancel-button" type="button">取消</button>
            <button class="primary-btn" type="submit">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal-layer is-hidden" id="confirm-layer" aria-hidden="true">
      <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="modal-head">
          <h3 id="confirm-title">确认操作</h3>
          <button class="close-btn" id="close-confirm-button" type="button" aria-label="关闭">
            ×
          </button>
        </div>

        <p class="modal-hint" id="confirm-message">
          请确认这次操作。
        </p>

        <div class="modal-actions">
          <button class="secondary-btn" id="cancel-confirm-button" type="button">取消</button>
          <button class="danger-btn" id="confirm-action-button" type="button">确认</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
